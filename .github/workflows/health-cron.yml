name: Health check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Curl /health
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "Missing secrets.HEALTHCHECK_URL" >&2
            exit 1
          fi

          curl --fail-with-body --silent --show-error --max-time 90 "$HEALTHCHECK_URL"
